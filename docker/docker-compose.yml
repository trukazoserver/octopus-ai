services:
  octopus-ai:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    ports:
      - "18789:18789"
    volumes:
      - octopus-data:/root/.octopus/data
    env_file:
      - .env
    restart: always
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:18789/api/health"]
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3

  web:
    build:
      context: ..
      dockerfile: docker/Dockerfile.web
    ports:
      - "80:80"
    depends_on:
      octopus-ai:
        condition: service_healthy
    restart: always
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  octopus-data:
