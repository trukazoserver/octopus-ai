services:
  octopus-ai:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    ports:
      - "18789:18789"
    volumes:
      - ~/.octopus/data:/root/.octopus/data
    restart: always

  web:
    build:
      context: ..
      dockerfile: docker/Dockerfile.web
    ports:
      - "5173:5173"
    depends_on:
      - octopus-ai
    restart: always
